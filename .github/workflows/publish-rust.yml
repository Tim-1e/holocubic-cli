name: Publish Rust crate

on:
  push:
    tags:
      - "rust-v*"

permissions:
  contents: read

concurrency:
  group: publish-rust-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'Tim-1e/holocubic-cli'
    runs-on: ubuntu-latest
    environment:
      name: crates-io
      url: https://crates.io/crates/holocubic-cli-rust
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: implementations/rust

    steps:
      - uses: actions/checkout@v6
      - name: Verify release tag
        shell: bash
        run: |
          VERSION="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "holocubic-cli-rust") | .version')"
          EXPECTED_TAG="rust-v${VERSION}"
          if [[ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]]; then
            echo "Expected tag ${EXPECTED_TAG}, got ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
      - name: Check formatting
        run: cargo fmt --check
      - name: Lint
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: Test
        run: cargo test --locked
      - name: Build release binary
        run: cargo build --release --locked
      - name: Package and verify crate
        run: cargo package --locked
      - name: Authenticate to crates.io with OIDC
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
